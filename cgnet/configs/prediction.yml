# Configuration file for CG-NET prediction/inference
# Optimized settings for prediction tasks on new data

experiment:
  name: "cgnet_prediction"      # Experiment name (used for logging directory)
  seed: 42                      # Random seed for reproducibility

# Data settings for prediction
data:
  path: "prediction_dataset"    # Path to raw dataset directory containing structures to predict
  train_ratio: 0.0              # No training data needed for prediction
  val_ratio: 0.0                # No validation data needed for prediction  
  test_ratio: 1.0               # Use all data for prediction
  save_cache: true              # Whether to cache processed dataset for faster loading
  save_dir: "prediction_graph_dataset"  # Directory to save cached processed dataset
  clean_cache: false            # Whether to clean existing cache and reprocess data
  use_parallel: false            # Enable parallel processing for faster data generation
  filter_isolated_nodes: true   # Whether to filter out graphs containing isolated nodes
  save_data_splits: false       # No need to save splits for prediction-only tasks
  load_data_splits: null        # No existing splits to load
  splits_save_path: null        # No splits to save

# Model architecture parameters (should match training configuration)
model:
  in_node_dim: 92               # Input node feature dimension (from atom_init.json)
  hidden_node_dim: 64           # Hidden node feature dimension in conv layers
  in_edge_dim: 41               # Input edge feature dimension (auto-detected from dataset)
  predictor_hidden_dim: 128     # Hidden features in the predictor MLP
  num_conv: 3                   # Number of convolutional layers
  n_h: 2                        # Number of hidden layers in predictor MLP
  n_tasks: 1                    # Number of prediction tasks
  task: "regression"            # Task type: "regression" or "classification"
  n_classes: 2                  # Number of classes (only used for classification)

# Training hyperparameters (minimal for prediction)
training:
  epochs: 1                     # Not used for prediction, set to minimal value
  batch_size: 128               # Larger batch size for efficient prediction
  lr: 0.001                     # Not used for prediction
  tmax: 1                       # Not used for prediction
  num_workers: 0                # More workers for faster data loading during prediction
  devices: 1                    # Number of devices to use for prediction
  strategy: null                # Training strategy (not used for prediction)
  early_stopping:               # Not used for prediction
    enabled: false
    monitor: "val_loss"
    patience: 10
    mode: "min"
    min_delta: 0.0
    verbose: false

# Cross-validation settings (not used for prediction)
cross_validation:
  enabled: false                # No cross-validation for prediction
  n_folds: 5
  stratified: false
  shuffle: false
  save_fold_results: false
  aggregate_results: false

# Graph featurization settings (should match training configuration)
featurizer:
  method: "CR"                  # Method for cluster construction: "CR" (cluster radius) or "nth-NN" (nth nearest neighbor)
  neighbor_radius: 8.0          # Cutoff radius for neighbor search (Angstrom)
  max_neighbors: 12             # Maximum number of neighbors per node
  cluster_radius: 10.0          # Cluster radius for CR method (Angstrom)
  neighbor_depth: 2             # Neighbor depth for nth-NN method (ignored if method="CR")
  max_cluster_nodes: null       # Maximum number of nodes in cluster graph (null = no limit)
  neighbor_mult: 1.15           # Multiplicative factor for neighbor radius in nth-NN method
  tag: 2                        # Tag for cluster center identification
  step: 0.2                     # Step size for Gaussian edge feature filter
  with_pseudonodes: true        # Whether to include pseudonodes in graph
  max_distance_factor: 2.0      # Maximum distance factor for neighbor search
  small_lattice_threshold: 5.0  # Threshold for small lattice detection
  enable_smart_images: true     # Whether to enable smart images
  conservative_small_lattice: false  # Whether to use conservative small lattice strategy

# Logging and model saving settings (minimal for prediction)
logging:
  log_dir: "logs/prediction"    # Directory for prediction logs
  save_top_k: 0                 # Don't save checkpoints during prediction
  monitor: "val_loss"           # Not used for prediction
  mode: "min"                   # Not used for prediction

# Device configuration (optimized for inference)
device:
  accelerator: "auto"           # Device accelerator (auto, gpu, cpu, mps)
  precision: 32                 # Numerical precision (16 for faster inference, 32 for stability)
  deterministic: false          # Not critical for prediction
  benchmark: true               # Enable for faster inference

# SLURM cluster settings (optimized for prediction jobs)
slurm:
  use_slurm: false              # Whether to use SLURM for job submission
  partition: "gpu"              # SLURM partition name (can use CPU partition for small predictions)
  nodes: 1                      # Number of nodes to request
  ntasks_per_node: 1            # Number of tasks per node
  cpus_per_task: 4              # Number of CPUs per task
  mem: "16GB"                   # Memory per node (reduced for prediction-only)
  gres: "gpu:1"                 # GPU resources (can be omitted for CPU-only prediction)
  time: "04:00:00"              # Maximum runtime (shorter for prediction)
  job_name: "cgnet_prediction"  # Job name
  account: null                 # Account to charge (set if required)
  qos: null                     # Quality of service (set if required)
  constraint: null              # Node constraints (e.g., specific GPU types)
  exclude: null                 # Nodes to exclude
  array: null                   # Job array specification (useful for batch predictions)
  output: "slurm_logs/cgnet_prediction_%j.out"  # Output file pattern (%j = job ID)
  error: "slurm_logs/cgnet_prediction_%j.err"   # Error file pattern (%j = job ID)
  mail_type: null               # Email notification type (e.g., "END", "FAIL")
  mail_user: null               # Email address for notifications
  nice: null                    # Job priority adjustment
  gpus_per_node: null           # Alternative GPU specification
  additional_parameters: {}     # Additional SLURM parameters as key-value pairs

# Prediction-specific settings
prediction:
  model_path: null              # Path to trained model checkpoint (required for prediction)
  output_file: "predictions.csv"  # Output file for predictions
  save_probabilities: true      # Whether to save class probabilities (for classification)
  save_raw_outputs: true        # Whether to save raw model outputs
  uncertainty_estimation: false # Whether to estimate prediction uncertainty (experimental)
  ensemble_prediction: false    # Whether to use ensemble of models for prediction
  ensemble_models: []           # List of model paths for ensemble prediction 